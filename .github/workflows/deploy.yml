name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# run in-progress and latest queued.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static site
        # The client/ssr builds and prerender all complete and write the
        # static site to .output/public before Nitro's (unneeded for a static
        # site) production server build fails — so don't let that fail the job.
        run: npm run build || echo "::warning::build exited non-zero (likely the unused Nitro server step); continuing"
        env:
          # Nitro preset that emits a static site (.output/public) with
          # .nojekyll and a 404.html fallback, ready for GitHub Pages.
          NITRO_PRESET: github_pages

      - name: Inspect build output
        run: |
          echo "=== .output/public tree ==="
          find .output/public -type f | sort
          echo "=== sanity: at least one .html must exist ==="
          test -n "$(find .output/public -name '*.html' -print -quit)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
